<div class="py-12 flex flex-col justify-center items-center bg-cream px-4">
  <div id="subscribeForm" class="w-[90%] md:w-[80%] lg:w-[60%] flex flex-col md:flex-row justify-center items-center gap-8 titolo">
    <div class="w-full flex flex-col justify-center items-center gap-2">
      <div class="self-stretch text-center md:text-left text-2xl font-bold">Subscribe to join the network</div>
      <div class="self-stretch text-center md:text-left text-charcoal text-lg">Stay up to date with the latest news, announcements, and articles.</div>
    </div>
    <!-- FORM -->
    <form class="w-full flex flex-col" action="https://formspree.io/f/xyzndyrb" method="POST" enctype="multipart/form-data" name="contact">
      <!-- Email -->
      <div class="w-full inline-flex flex-col md:flex-row justify-center items-center gap-2">
        <div class="w-full inline-flex justify-start items-start gap-8">
          <div class="w-full flex-1 flex flex-col justify-self-end">
            <input id="subscribe" name="subscribe" type="text" placeholder="Your email address..." class="w-full px-4 bg-white rounded-3xl flex-1 opacity-50 justify-start text-chocolate leading-7 outline outline-1 outline-gray-100">
          </div>
        </div>

        <!-- Submit -->
        <button class="w-full md:w-[200px] py-2 flex justify-center items-center" onclick="submitSubscriptionForm()">
          <a class="w-full inline-flex items-center justify-center whitespace-nowrap py-3 md:py-3 px-6 md:px-8 white bg-green rounded-3xl">
            Subscribe
            <span class="pl-2">
              {% include icon.html icon="arrow-right" %}
            </span>
          </a>
        </button>
      </div>
    </form>
  </div>

<div class="my-4 titolo" id="submitSubscribeForm" style="display: none;">

  <div class="flex-1 self-stretch flex flex-col justify-start items-start gap-6">
    {% include title.html caption="Message Sent" title="Thank You" dot="yes" align="center" %}
  </div>
  <div class="max-w-lg text-center self-stretch text-chocolate justify-start text-lg leading-loose">You’ve successfully subscribed! Stay tuned for updates, insights, and news delivered straight to your inbox.</div>
</div>
</div>
