<div class="w-full flex-shrink-0 bg-white rounded-xl shadow-[0px_1px_3px_0px_rgba(0,0,0,0.16)] hover:shadow-[0_4px_12px_rgba(0,0,0,0.12)] p-6 transition-all duration-300 bg-cream">
  <!-- Question -->
  <button
	@click="openFaq = (openFaq === {{ include.index }}) ? null : {{ include.index }}"
	class="flex justify-between items-center w-full text-left text-lg font-medium text-charcoal focus:outline-none"
  >
	<span>{{ include.faq.question }}</span>

	<!-- Fancy Plus/Minus Icon -->
	<span
	  class="relative w-5 h-5 flex items-center justify-center transition-transform duration-300 ease-in-out"
	  :class="{ 'rotate-180': openFaq === {{ include.index }} }"
	>
	  <!-- Horizontal line -->
	  <span
		class="absolute w-4 h-[2px] bg-green transition-opacity duration-300 ease-in-out"
		:class="{ 'opacity-0': openFaq === {{ include.index }} }"
	  ></span>

	  <!-- Vertical line -->
	  <span
		class="absolute w-[2px] h-4 bg-green transition-transform duration-300 ease-in-out"
		:class="{ 'rotate-90': openFaq === {{ include.index }} }"
	  ></span>
	</span>
  </button>

  <!-- Answer -->
  <div
	x-show="openFaq === {{ include.index }}"
	x-collapse.duration.300ms
	class="mt-4 overflow-hidden"
  >
	<div
	  x-transition:enter="ease-out duration-300"
	  x-transition:enter-start="opacity-0 translate-y-1"
	  x-transition:enter-end="opacity-100 translate-y-0"
	  x-transition:leave="ease-in duration-200"
	  x-transition:leave-start="opacity-100 translate-y-0"
	  x-transition:leave-end="opacity-0 translate-y-1"
	  class="text-gray-700 text-base leading-relaxed"
	>
	  {{ include.faq.answer }}
	</div>
  </div>
</div>
