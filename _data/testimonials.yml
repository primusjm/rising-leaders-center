testimonials:
  - author: Rebecca Gyumi
    company: Msichana Initiative
    testimonial: We have become closer as management, the energy which is transmitting to the people we are leading as well. Our sense our shared goal and connectedness has improved, greatly.

  - author: Khira Geoffrey
    company: Basic Needs Basic Rights
    testimonial: One noticeable shift is the increased collaboration and inclusivity within the management team. We have created spaces where staff across different levels are more involved in decision-making processes, fostering a sense of ownership and accountability.

  - author: Dennis Nyakundi
    company: PAL Network
    testimonial: I've noticed several key shifts in our team's way of working. First, we have become better at prioritizing, focusing on high-impact tasks and learning to say no, when necessary, which has sharpened our focus.
  
  - author: Grace Musimiire
    company: Building Tomorrow/Regional Education Learning Initiative
    testimonial: My confidence changed completely. I just confirmed that who I am was enough and with that assurance, I can do anything.
  
  - author: Devotha Mlay
    company: Zizi Afrique Foundation
    testimonial: One of the key thing that changed at my personal level is self awareness. The coaching sessions and skilling sessions provided by CRLI helped me to be more aware of myself and hence made me a better leader of others and of my own life.
  
  - author: Patrice Gwasma
    company: COSITA
    testimonial: In terms of organization, the changes led to meeting reporting deadlines, teamwork spirit, and a very harmonized work environment.
  
  - author: Margaret Wawira
    company: RELI Africa
    testimonial: This has been a wake up call on the need to establish a healthier work-life balance and well-being.
  
  - author: Kandi Alum
    company: Foundation for Inclusive Community Help
    testimonial: I have adopted ways of being a good listener. Nowadays, I have adopted new ways of being emotionally aware, say being calm when faced with a hard situation that drives off my mood - this has been possible through the different practices that our coach has taken us through.
  
  - author: Ernest Kaddu
    company: Literacy and Adult Basic Education
    testimonial: We are now more deliberate on moving many issues from pending to closure; our team is learning to resolve matters together, rather than letting them link.
  
  - author: Furahini Michael
    company: Msichana Initiative
    testimonial: We are more vulnerable to each other than before, and we now work more collaboratively as we are more open and honest to each other.
  
  - author: Godfrey Ssentumbwe
    company: Literacy and Adult Basic Education
    testimonial: I was experiencing a lot of tension, but the journey has equipped me with better ways of managing stress and leading calmly.
  
  - author: Grace Kadenge
    company: The Action Foundation
    testimonial: Understanding my blind spots has enhanced my collaboration skills, this has enabled me to be more vulnerable and transparent about areas where I may lack insight or expertise. 
  
  - author: Namuyomba Samalie
    company: Kukuza
    testimonial: We are now free with each other, no tension among us.
