faqs:
  - question: What is the time commitment of CRLI?
    answer: CRLI is an initial nine-month time commitment followed by twelve months of support implementing Personal Transformation Plans and Organizational Transformation Action Plan. This is a developmental coaching program. You and your team will get out of the experience what you put into it. In addition to practical learning sessions and coaching sessions with your coach, we expect that your team will engage in co-created practices designed to enhance your engagement and learning. On an average week, we anticipate that teams will complete two hours of CRLI-related work, though some weeks may have more or less depending on the schedule. 
    area: coaching

  - question: What is the schedule of CRLI? 
    answer: CRLI runs for nine months. It begins with prework to help you understand yourself, your team, as well as how you interact with others. After the completion of prework, all CRLI participants in a cohort come together for a three-day structured Immersion for learning. During and after the Immersion, teams work together with their coach on their challenges and goals, co-creating practices designed to address the team’s needs. 
  
      At the conclusion of CRLI, we bring together each participant for a three-day Celebration Summit including learning and sharing. After the Celebration Summit, each team and organizational will continue to work on implementing their Organizational Transformation Action Plans. Each individual continues to work on implementing their Personal Transformation Plan.
    area: coaching
  
  - question: What will I learn in CRLI?
    answer: At CRLI, you will learn about yourself and your team, giving you the opportunity to understand yourself and others more fully, live your purpose, lead more authentically and enhance your organization’s ability to reach its goals and those of your community.
    area: coaching
  
  - question: Will I have the opportunity to connect with other participants and professionals in CRLI?
    answer: Yes! Your organization will be participating in a cohort of other likeminded organizations, giving you the opportunity to connect with and learn from other amazing individuals
    area: coaching
  
  - question: How will my organization benefit from CRLI? 
    answer: Your organization will have the opportunity to work on addressing the challenges it faces from the inside-out with the accompaniment of a coach. Many organizations report greater tie to their mission, improved communication, and better leadership and management practices at the conclusion of CRLI, in addition to other benefits.
    area: coaching
  
  - question: How is CRLI different from other leadership programs? 
    answer: CRLI is different from leadership programs that focus on helping an individual develop better leadership skills to equip them for their next role. Instead, we help leaders connect to themselves, their purpose, and one another, helping them to enact dramatic changes that support their wellbeing and performance. 
    area: coaching

  - question: Can multiple people from my organization participate? Do we all need to participate at the same time?
    answer: CRLI is only open to organizations that will send their entire leadership team. We expect that all team members will participate at the same time.
    area: coaching
  
  - question: How will my progress by evaluated?
    answer: We encourage participants in CRLI to journal and listen to themselves, evaluating themselves, their experience, and their teams throughout the journey. Each team is accompanied by a trained coach who will provide ongoing feedback and support throughout the journey. At the conclusion of CRLI, you will develop a Personal Transformation Plan and an Organizational Transformation Action Plan.
    area: coaching

  - question: After I graduate from CRLI, how can I stay engaged and keep learning? 
    answer: RLC continues to engage its alumni in a variety of ways, including through learning surveys and practical learning sessions to enhance topical learning and networking between participating organizations. More importantly, after your graduation from CRLI, your team will continue to carry forward learning from the institute internally. In many cases, teams find this the optimum time to test out new approaches given their increased level of trust and wellbeing.
    area: coaching
