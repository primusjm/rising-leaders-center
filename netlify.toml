[build]
  command = "npm install && bundle exec jekyll build"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  RUBY_VERSION = "3.2.2"
  JEKYLL_ENV = "production"

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/callback"
  to = "/.netlify/functions/callback"
  status = 200
