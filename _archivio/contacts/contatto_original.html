---
layout: compressa
---
{% include capo.html %}
<section class="pb-0">
    <div class="bg-cover bg-no-repeat bg-center h-screen" style="background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url(/assets/foto/altro/contatto.webp)">
        {% include nav.html %}
        <div class="flex flex-col justify-center items-center text-light text-center titolo">
            <div class="mt-14 md:mt-28">
                <div class="text-4xl md:text-5xl font-display mx-2">
                    Let's Talk
                </div>
                <div class="my-4 mx-auto max-w-md text-lg">
                    Good communication is the bridge <br>between confusion &amp; clarity.
                </div>
            </div>
        </div>
        <div class="flex flex-col items-center">
            <form class="mx-14 mx-auto my-10 max-w-7xl" action="https://formspree.io/f/mnqwopbz" method="POST" enctype="multipart/form-data" name="contact" id="my-form">
                <div class="flex flex-wrap -mx-3 mb-6">
                    <div class="w-full md:w-1/2 px-3 mb-6 md:mb-0">
                        <label class="block uppercase tracking-wide text-white text-xs font-bold mb-2" for="first-name">
                            First Name *
                        </label>
                        <input class="appearance-none block w-full bg-overlay text-gray-700 border border-overlay rounded-lg py-3 px-4 mb-3 leading-tight focus:bg-white" id="first-name" name="first-name" type="text" placeholder="Jon" required>
                    </div>
                    <div class="w-full md:w-1/2 px-3">
                        <label class="block uppercase tracking-wide text-white text-xs font-bold mb-2" for="last-name">
                            Last Name
                        </label>
                        <input class="appearance-none block w-full bg-overlay text-gray-700 border border-overlay rounded-lg py-3 px-4 leading-tight focus:bg-white" id="last-name" name="last-name" type="text" placeholder="Snow">
                    </div>
                </div>
                <div class="flex flex-wrap -mx-3 mb-6">
                    <div class="w-full md:w-1/2 px-3 mb-6 md:mb-0">
                        <label class="block uppercase tracking-wide text-white text-xs font-bold mb-2" for="email">
                            E-mail *
                        </label>
                        <input class="appearance-none block w-full bg-overlay text-gray-700 border border-overlay rounded-lg py-3 px-4 mb-3 leading-tight focus:bg-white" id="email" name="email" type="email" placeholder="jon@winterfell.com" required>
                    </div>
                    <div class="w-full md:w-1/2 px-3 mb-6 md:mb-0">
                        <label class="block uppercase tracking-wide text-white text-xs font-bold mb-2" for="phone">
                            Phone *
                        </label>
                        <input class="appearance-none block w-full bg-overlay text-gray-700 border border-overlay rounded-lg py-3 px-4 mb-3 leading-tight focus:bg-white" id="phone" name="phone" type="tel" placeholder="+000-123-456-789">
                    </div>
                </div>
                <div class="flex flex-wrap -mx-3 mb-6">
                    <div class="w-full px-3">
                        <label class="block uppercase tracking-wide text-white text-xs font-bold mb-2" for="message">
                            Message *
                        </label>
                        <textarea class=" no-resize appearance-none block w-full bg-overlay text-gray-700 border border-overlay rounded-lg py-3 px-4 mb-3 leading-tight focus:bg-white h-40 resize-none" id="message" name="message" placeholder="Please type your message here..." required></textarea>
                    </div>
                </div>
                <div class="md:flex md:items-center">
                    <div class="md:w-1/3">
                        <button onclick="submitForm()">
                            <a class="text-md inline-flex items-center justify-center whitespace-nowrap rounded-lg py-1 md:py-2 px-6 md:px-10 font-medium text-white bg-brand hover:bg-dark">
                                Send
                                <span class="icon arrow"></span>
                            </a>
                        </button>
                    </div>
                </div>
            </form>
            <div class="mt-14 mb-8 titolo" id="submitForm" style="display: none;">
                <div class="mx-14 mx-auto my-8 text-center text-4xl font-display text-white">
                    Thank you for your message!
                </div>
                <div class="flex flex-col items-center mx-auto">
                    {% include pulsanti.html link="/" label="Go to Homepage" type="nav" %}
                </div>
            </div>
        </div>
    </div>
</section>
{% include piede.html %}
